user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # No IP address is logged for privacy
    log_format anonymized '0.0.0.0 - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent"';

    access_log  /var/log/nginx/access.log anonymized;
    error_log   /var/log/nginx/error.log;

    # Rate limit (1 request per second per IP)
    limit_req_zone $binary_remote_addr zone=feedback_limit:10m rate=1r/s;

    server {
        listen 9999;
        server_name _;

	# Return 429 if the limit is reached
	limit_req_status 429;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;

            # Clear IP headers
            proxy_set_header X-Real-IP "";
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-Proto $scheme;

            # Perl PSGI/Plack apps stuff
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }

        # Deny access to hidden files (like .git)
        location ~ /\. {
            deny all;
        }
    }
}
